<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="card-clip"><rect x="0" y="0" width="1200" height="630" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <!-- Background -->
    <rect width="1200" height="630" fill="#FAFAF8"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.035">
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a18" stroke-width="0.5"/>
        <line x1="0" y1="0" x2="40" y2="0" stroke="#1a1a18" stroke-width="0.5"/>
      </pattern>
      <rect width="1200" height="630" fill="url(#grid)"/>
    </g>

    <!-- Left section: branding -->
    <g>
      <!-- Brand name -->
      <text x="100" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#1a1a18" letter-spacing="-2.5">invoicelet</text>
      
      <!-- Tagline -->
      <text x="104" y="278" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#6b6b66" font-weight="400" letter-spacing="0.4">Beautiful invoices. Zero friction.</text>

      <!-- Feature pills -->
      <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="500">
        <rect x="100" y="320" width="100" height="40" rx="20" fill="#E8E6DF" stroke="none"/>
        <text x="150" y="345" text-anchor="middle" fill="#4a4a46">Free</text>
        
        <rect x="216" y="320" width="140" height="40" rx="20" fill="#E8E6DF" stroke="none"/>
        <text x="286" y="345" text-anchor="middle" fill="#4a4a46">PDF export</text>
        
        <rect x="372" y="320" width="168" height="40" rx="20" fill="#E8E6DF" stroke="none"/>
        <text x="456" y="345" text-anchor="middle" fill="#4a4a46">Multi-currency</text>
      </g>

      <!-- URL -->
      <text x="104" y="500" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#9c9c96" font-weight="400">invoicelet.com</text>
    </g>

    <!-- Right section: mini invoice mockup -->
    <g transform="translate(720, 60)">
      <!-- Invoice card shadow -->
      <rect x="6" y="6" width="390" height="510" rx="12" fill="#1a1a18" opacity="0.06"/>
      <!-- Invoice card -->
      <rect x="0" y="0" width="390" height="510" rx="12" fill="#FFFFFF" stroke="#E0DED7" stroke-width="0.5"/>
      
      <!-- Invoice header -->
      <text x="36" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#1a1a18">Your Company</text>
      <text x="36" y="70" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#9c9c96">your@email.com</text>
      
      <text x="354" y="44" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" font-style="italic" fill="#B5452A">Invoice</text>
      <text x="354" y="64" text-anchor="end" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#9c9c96"># 001</text>
      
      <!-- Separator -->
      <line x1="36" y1="90" x2="354" y2="90" stroke="#1a1a18" stroke-width="2" opacity="0.12"/>
      
      <!-- FROM / BILL TO -->
      <text x="36" y="125" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#9c9c96" letter-spacing="1.2" font-weight="600">FROM</text>
      <text x="36" y="145" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">Your Name</text>
      <text x="36" y="162" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b6b66">123 Street</text>
      <text x="36" y="178" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b6b66">City, Country</text>
      
      <text x="220" y="125" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#9c9c96" letter-spacing="1.2" font-weight="600">BILL TO</text>
      <text x="220" y="145" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">Client Name</text>
      <text x="220" y="162" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b6b66">456 Avenue</text>
      <text x="220" y="178" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b6b66">City, Country</text>
      
      <!-- Table header -->
      <rect x="26" y="205" width="338" height="30" rx="4" fill="#F5F4F0"/>
      <text x="36" y="224" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b6b66" letter-spacing="0.8" font-weight="600">DESCRIPTION</text>
      <text x="240" y="224" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b6b66" letter-spacing="0.8" font-weight="600">QTY</text>
      <text x="354" y="224" text-anchor="end" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6b6b66" letter-spacing="0.8" font-weight="600">AMOUNT</text>
      
      <!-- Row 1 -->
      <text x="36" y="262" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">Web Design</text>
      <text x="250" y="262" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">1</text>
      <text x="354" y="262" text-anchor="end" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">$500.00</text>
      
      <line x1="36" y1="276" x2="354" y2="276" stroke="#F0EEE8" stroke-width="0.5"/>

      <!-- Row 2 -->
      <text x="36" y="300" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">Development</text>
      <text x="250" y="300" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">3</text>
      <text x="354" y="300" text-anchor="end" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#3d3d3a">$600.00</text>


      
      <!-- Currency badge -->
      <rect x="270" y="385" width="84" height="28" rx="14" fill="#F5F4F0" stroke="#E0DED7" stroke-width="0.5"/>
      <text x="312" y="403" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b6b66">$ USD</text>

      <!-- PDF button mockup -->
      <rect x="26" y="448" width="90" height="34" rx="6" fill="#1a1a18"/>
      <text x="71" y="470" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#FAFAF8" font-weight="600">PDF</text>
    </g>

    <!-- Decorative accent line (bottom) -->
    <rect x="0" y="616" width="1200" height="14" fill="#B5452A"/>
  </g>
</svg>